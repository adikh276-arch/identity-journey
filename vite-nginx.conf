server {
    listen 80;
    include /etc/nginx/mime.types;

    location /identity_journey/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /identity_journey/index.html;

        # Explicitly handle static assets to avoid falling back to index.html for missing files
        location ~* \.(?:css|js|woff2?|eot|ttf|otf|ico|png|jpe?g|gif|svg)$ {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "max-age=31536000, public";
            try_files $uri =404;
        }
    }

    location = / {
        return 301 /identity_journey/;
    }

    error_page 404 /identity_journey/index.html;
}
